<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Danh sách trang</title>
</head>
<body>
	<div th:fragment="content">

		<h2>Page List</h2>
		
		<table border="1">
		    <tr>
		        <th>ID</th>
		        <th>Name</th>
		        <th>Parent</th>
		        <th>Action</th>
		    </tr>
		
		    <tr th:each="p : ${pages}">
		        <td th:text="${p.id}"></td>
		        <td th:text="${p.pageName}"></td>
		        <td th:text="${p.parentPageId}"></td>
		        <td>
		            <a th:href="@{'/page/view/' + ${p.id}}">View</a>
		            <a th:href="@{/page/new/">New</a>
		            <a th:href="@{'/page/delete/' + ${p.id}}">Delete</a>
		        </td>
		    </tr>
		</table>

	</div>
</body>
</html>
