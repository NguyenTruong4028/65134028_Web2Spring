<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Times New Roman;
}

.container{
    width:100%;
    height:100vh;
    border:1px solid black;
    display:flex;
    flex-direction:column;
}

/* HEADER */

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid black;
    padding:10px;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo img{
    width:50px;
}

.username{
    font-size:18px;
}

/* MAIN */

.main{
    flex:1;
    display:flex;
}

/* SIDEBAR */

.sidebar{
    width:220px;
    border-right:1px solid black;
    padding:10px;
}

.menu-title{
    font-weight:bold;
    font-size:20px;
    margin-bottom:10px;
}

.sidebar ul{
    list-style:none;
}

.sidebar li{
    border:1px solid #999;
    padding:8px;
    margin-bottom:5px;
    background:#eee;
}

/* CONTENT */

.content{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
}

/* FOOTER */

.footer{
    text-align:center;
    border-top:1px solid black;
    padding:8px;
}
</style>
<body>

<div class="container">

    <!-- Header -->
    <div class="header">
        <div class="logo">
            <div>
                <div>TRƯỜNG ĐẠI HỌC NHA TRANG</div>
                <div>KHOA CÔNG NGHỆ THÔNG TIN</div>
            </div>
        </div>

        <div class="username">[UserName]</div>
    </div>

    <!-- Main -->
    <div class="main">

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="menu-title">Dasdboard</div>
            <ul>
                <li>Page -List</li>
                <li>Page -Addnew</li>
                <li>Post -List</li>
                <li>Post -Addnew</li>
            </ul>
        </div>

        <!-- Content -->
        <div class="content">
            Content
        </div>

    </div>

    <!-- Footer -->
    <div class="footer">
        ©2025 by Nguyen Hong Truong – FIT.NTU
    </div>

</div>

</body>
</html>
