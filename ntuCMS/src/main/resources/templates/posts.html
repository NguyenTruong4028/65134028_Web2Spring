<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<title>Danh sách các bài viết</title>
</head>
<body>
	<table border = "1">
		<thead>
	        <tr>
	            <th>id</th>
	            <th>Title</th>
	            <th>Category ID</th>
	            <th>[view][edit][delete]</th>
	        </tr>
    	</thead>
	    <tbody>
	        <tr th:each="ps:${lsPost}">
	            <td th:text="${ps.id}"></td>
	            <td th:text="${ps.title}"></td>
	            <td th:text="${ps.categoryId}"></td>
	         	<td>
				    <a th:href="@{/page/view/{id}(id=${p.id})}">
				        <i class="fa fa-eye"></i>
				    </a>
				
				    <a th:href="@{/page/edit/{id}(id=${p.id})}">
				        <i class="fa fa-pen"></i>
				    </a>
				
				    <a th:href="@{/page/delete/{id}(id=${p.id})}">
				        <i class="fa fa-trash"></i>
				    </a>
				</td>
	        </tr>
	    </tbody>
	</table>
</body>
</html>
