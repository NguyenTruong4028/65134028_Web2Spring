<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Thêm bài viết mới</title>
</head>
<body>
	<h2>Thêm bài viết</h2>

	<form action="/post/new" method="post">
	
		<table>
		
			<tr>
			    <td>ID</td>
			    <td>
			        <input type="text" name="id">
			    </td>
			</tr>
			
			<tr>
			    <td>Title</td>
			    <td>
			        <input type="text" name="tieude">
			    </td>
			</tr>
			
			<tr>
			    <td>Content</td>
			    <td>
			        <textarea name="nd" rows="5" cols="40"></textarea>
			    </td>
			</tr>
			
			<tr>
			    <td>Category ID</td>
			    <td>
			        <input type="text" name="loai">
			    </td>
			</tr>
			<tr>
			    <td>Image</td>
			    <td>
			        <input type="text" name="anh">
			    </td>
			</tr>
			<tr>
			    <td></td>
			    <td>
			        <button type="submit">Save</button>
			        <button type="reset">Reset</button>
			    </td>
			</tr>
		
		</table>
	
	</form>
</body>
</html>
