<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Thêm trang mới</title>
</head>
<body>
	<h2>Add New Page</h2>

<form action="/page/new" method="post">

<table>

<tr>
    <td>ID</td>
    <td>
        <input type="text" name="id">
    </td>
</tr>

<tr>
    <td>Page Name</td>
    <td>
        <input type="text" name="pName">
    </td>
</tr>

<tr>
    <td>Keyword</td>
    <td>
        <input type="text" name="key">
    </td>
</tr>

<tr>
    <td>Content</td>
    <td>
        <textarea name="nd" rows="5" cols="40"></textarea>
    </td>
</tr>

<tr>
    <td>Parent Page ID</td>
    <td>
        <input type="text" name="parent">
    </td>
</tr>

<tr>
    <td></td>
    <td>
        <button type="submit">Save</button>
        <button type="reset">Reset</button>
    </td>
</tr>

</table>

</form>
</body>
</html>
